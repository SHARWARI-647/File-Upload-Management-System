{% extends "base.html" %}
{% block title %}Login - File Manager{% endblock %}
{% block body_class %}auth-page{% endblock %}
{% block body %}
<div class="auth-container">
    <div class="auth-card">
        <div class="text-center mb-4">
            <i class="bi bi-cloud-arrow-up-fill auth-logo"></i>
            <h2>Welcome Back</h2>
            <p class="text-muted">Sign in to manage your files</p>
        </div>
        <form method="POST" action="{{ url_for('auth.login') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-3">
                <label class="form-label">Username or Email</label>
                <input type="text" name="identifier" class="form-control" required autofocus>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <div class="mb-3 form-check">
                <input type="checkbox" name="remember" class="form-check-input" id="remember">
                <label class="form-check-label" for="remember">Remember me</label>
            </div>
            <button type="submit" class="btn btn-primary w-100">Login</button>
        </form>
        <p class="text-center mt-3 mb-0">
            Don't have an account? <a href="{{ url_for('auth.register') }}">Register</a>
        </p>
        <button class="btn btn-outline-secondary btn-sm mt-3 w-100" id="themeToggle" type="button">
            <i class="bi bi-moon-stars-fill" id="themeIcon"></i> Toggle theme
        </button>
    </div>
</div>
{% endblock %}
